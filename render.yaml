services:
  - type: web
    name: tona-agent-studio
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /gateway/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: TEAMFLOW_DATA_DIR
        value: /var/data/teamflow
      - key: TEAMFLOW_INITIAL_ADMIN_PASSWORD
        sync: false
      - key: REMINDER_TIMEZONE
        value: Asia/Shanghai
      - key: REMINDER_HOUR
        value: 9
    disk:
      name: tona-agent-data
      mountPath: /var/data
      sizeGB: 1
