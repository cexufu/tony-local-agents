services:
  - type: web
    name: teamflow-lite
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: INITIAL_ADMIN_PASSWORD
        generateValue: true
      - key: FEISHU_REMINDER_WEBHOOK
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: REMINDER_TIMEZONE
        value: Asia/Shanghai
      - key: REMINDER_HOUR
        value: 9
    disk:
      name: teamflow-data
      mountPath: /var/data
      sizeGB: 1
